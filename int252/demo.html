<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div class="flex justify-evenly bg-green-200">
        <input type="number" class="bg-red-300 border border-black rounded px-4 py-2 text-black" id="regno" placeholder="Registeration number..."/>
        <input type="text" class="bg-red-300 border border-black rounded px-4 py-2 text-black" id="name" placeholder="Enter your name..."/>
        <input type="number" class="bg-red-300 border border-black rounded px-4 py-2 text-black" id="cgpa" placeholder="Enter CGPA..."/>
        <button class="bg-blue-300 px-4 py-2 border border-black rounded text-white" id="button" onclick="handleClick()">Submit</button>
    </div>

    <div class="border p-4 m-2">
        <table class="mx-auto" id="table">
            <tr class="bg-red-200">
            <th class="border p-3 w-80 text-center">Registeration number</th>
            <th class="border p-3 w-80 text-center">Name</th>
            <th class="border p-3 w-80 text-center">CGPA</th>
            </tr>
        </table>
    </div>
    <script>
        let data = [];
        function handleClick(){
        let obj={ 
            name: document.getElementById("name").value,
            regno: document.getElementById("regno").value,
            cgpa: document.getElementById("cgpa").value
        }
            data.push(obj);
            console.log(data);
            document.getElementById("name").value = "";
            document.getElementById("regno").value = "";
            document.getElementById("cgpa").value = "";
            show();
            }
        function show(){
            let newData= data.map((i)=>{
            return `<tr class="bg-red-200">
            <th class="border p-3 w-80 text-center">${i.regno}</th>
            <th class="border p-3 w-80 text-center">${i.name}</th>
            <th class="border p-3 w-80 text-center">${i.cgpa}</th>
            </tr>`
            })
            document.getElementById("table").innerHTML += newData;
        }
    
    </script>
</body>
</html>
