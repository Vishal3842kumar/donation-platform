<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <input type="text" id="a" placeholder="Type your name">
    <input type="email" id="b" placeholder="Type your email">
    <input type="number" id="c" placeholder="Type your number">
    <button onclick="handleClick()">Click</button>
    <div id="output"></div>
    <script>
        function handleClick(){
            let div = document.getElementById("output");
            let name = document.getElementById("a").value;
            let email = document.getElementById("b").value;
            let age = document.getElementById("c").value;

            div.innerHTML = `
                <p>Name: ${name}</p>
                <p>Email: ${email}</p>
                <p>Age: ${age}</p>
            `;
            
            console.log("Name: " + name);
            console.log("Email: " + email);
            console.log("Age: " + age);
        }
    </script>
</body>
</html>
